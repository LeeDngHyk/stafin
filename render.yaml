# Render.com 블루프린트 — 단일 웹 서비스로 API + 웹을 함께 배포
# 사용법: GitHub에 푸시 → Render 대시보드 New + → Blueprint → 이 저장소 선택
services:
  - type: web
    name: stafin-mk2
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      # 영구 보존 Postgres 연결 주소 (Neon 등). 대시보드에서 직접 입력(시크릿).
      - key: DATABASE_URL
        sync: false
